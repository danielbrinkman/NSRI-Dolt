{% extends "library/base.html" %}
{% block title %}Delete {{ type }} — Dolt Library{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Delete {{ type }}</h1>
</div>

<div class="form-card">
  <p style="margin-bottom:1.5rem;color:var(--muted)">
    Are you sure you want to delete <strong style="color:var(--text)">{{ object }}</strong>?
    This action will be committed to Dolt.
  </p>
  <form method="post">
    {% csrf_token %}
    <div style="display:flex;gap:10px">
      <button type="submit" class="btn btn-danger">Delete &amp; Commit</button>
      <a href="{% url 'home' %}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
