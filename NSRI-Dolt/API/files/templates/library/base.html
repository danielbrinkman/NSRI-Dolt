<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Dolt Library{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f0f;
      --surface:  #181818;
      --border:   #2a2a2a;
      --accent:   #c8a96e;
      --accent2:  #6ec8a9;
      --danger:   #c86e6e;
      --text:     #e8e2d9;
      --muted:    #6e6860;
      --mono:     'IBM Plex Mono', monospace;
      --serif:    'Playfair Display', Georgia, serif;
      --sans:     'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── nav ── */
    nav {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 56px;
    }
    nav .brand {
      font-family: var(--serif);
      font-size: 1.15rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }
    nav .brand span { font-style: italic; }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.15s;
    }
    nav a:hover { color: var(--text); }
    nav .spacer { flex: 1; }
    nav .badge {
      font-family: var(--mono);
      font-size: 0.65rem;
      background: #1e1a14;
      color: var(--accent);
      border: 1px solid #3a3020;
      padding: 2px 8px;
      border-radius: 3px;
    }

    /* ── layout ── */
    main { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }

    /* ── messages ── */
    .messages { margin-bottom: 1.5rem; }
    .message {
      font-size: 0.82rem;
      padding: 10px 14px;
      border-left: 3px solid var(--accent2);
      background: #0d1f1a;
      color: var(--accent2);
      margin-bottom: 6px;
      font-family: var(--mono);
    }
    .message.error { border-color: var(--danger); background: #1f0d0d; color: var(--danger); }

    /* ── typography ── */
    h1 {
      font-family: var(--serif);
      font-size: 2rem;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 0.25rem;
    }
    h2 {
      font-family: var(--serif);
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
      margin-top: 2rem;
    }
    h2:first-child { margin-top: 0; }

    /* ── tables ── */
    .table-wrap { overflow-x: auto; margin-bottom: 2rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th {
      text-align: left;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface); }

    /* ── buttons ── */
    .btn {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 3px;
      border: 1px solid transparent;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
    }
    .btn-primary {
      background: var(--accent);
      color: #0f0f0f;
      border-color: var(--accent);
    }
    .btn-primary:hover { background: #d4b87e; }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border-color: var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: #444; }
    .btn-danger {
      background: transparent;
      color: var(--danger);
      border-color: #3a1818;
    }
    .btn-danger:hover { background: #1f0d0d; }
    .btn-teal {
      background: transparent;
      color: var(--accent2);
      border-color: #1a3a30;
    }
    .btn-teal:hover { background: #0d1f1a; }

    .actions { display: flex; gap: 6px; align-items: center; }

    /* ── drift banner ── */
    .drift-banner {
      background: #1f140a;
      border: 1px solid #4a2e0a;
      border-left: 4px solid var(--accent);
      padding: 14px 18px;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.82rem;
    }
    .drift-banner strong { color: var(--accent); font-family: var(--mono); }

    /* ── section header ── */
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      margin-top: 2rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .section-header:first-of-type { margin-top: 0; }

    /* ── forms ── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2rem;
      max-width: 560px;
    }
    .form-row { margin-bottom: 1.25rem; }
    label {
      display: block;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input[type=text], input[type=number], textarea, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      font-family: var(--sans);
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    .helptext { font-size: 0.72rem; color: var(--muted); margin-top: 4px; font-family: var(--mono); }
    .errorlist { list-style: none; color: var(--danger); font-size: 0.78rem; margin-top: 4px; font-family: var(--mono); }

    /* ── mono pill ── */
    .pill {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.68rem;
      padding: 2px 7px;
      border-radius: 2px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .pill.drift { background: #1f140a; border-color: #4a2e0a; color: var(--accent); }

    /* ── page header ── */
    .page-header { margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .page-header p { color: var(--muted); font-size: 0.85rem; margin-top: 0.35rem; }

    /* ── dolt log ── */
    .commit-row td:first-child { font-family: var(--mono); font-size: 0.72rem; color: var(--accent); }
    .commit-date { color: var(--muted); font-family: var(--mono); font-size: 0.72rem; }
  </style>
</head>
<body>

<nav>
  <a href="{% url 'home' %}" class="brand">Dolt <span>Library</span></a>
  <a href="{% url 'home' %}">Catalogue</a>
  <a href="{% url 'dolt_log' %}">Commit Log</a>
  <a href="{% url 'dolt_diff' %}">Diff</a>
  <span class="spacer"></span>
  <span class="badge">dolt + django</span>
</nav>

<main>
  {% if messages %}
  <div class="messages">
    {% for message in messages %}
    <div class="message {% if message.tags == 'error' %}error{% endif %}">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}

  {% block content %}{% endblock %}
</main>

</body>
</html>
